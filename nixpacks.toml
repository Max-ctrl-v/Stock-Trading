# Only use Python provider — ignore package.json (puppeteer is for local screenshots only)
providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = ["python3 -m ensurepip --upgrade", "python3 -m pip install -r requirements.txt"]

[start]
cmd = "python3 -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
