# Only use Python provider — ignore package.json (puppeteer is for local screenshots only)
providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
    "python3 -m venv /opt/venv",
    "/opt/venv/bin/pip install -r requirements.txt"
]
dependsOn = ["setup"]

[start]
cmd = "/opt/venv/bin/python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000"
